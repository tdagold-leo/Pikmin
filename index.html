<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏-巨菇-倒數追蹤器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f9f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative; /* 為了讓瀏覽次數定位 */
        }
        
        /* 【新功能】瀏覽次數樣式 */
        .view-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #c5e1a5;
        }

        h2, h3 {
            margin-top: 0;
            color: #2e7d32;
        }
        h3 {
            margin-top: 30px;
            border-bottom: 2px dashed #c5e1a5;
            padding-bottom: 8px;
            color: #558b2f;
        }
        
        .input-form {
            background: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .form-row-top {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }
        
        .form-row-bottom {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            width: 100%;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 200px;
        }
        
        .input-group label {
            font-size: 12px;
            color: #558b2f;
            font-weight: bold;
        }
        
        .input-form input {
            padding: 8px 12px;
            border: 1px solid #c5e1a5;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            height: 38px;
            width: 100%;
        }
        
        .time-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .time-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 65px;
        }
        .time-box label {
            font-size: 12px;
            color: #558b2f;
            font-weight: bold;
            text-align: center;
        }
        .time-box input {
            text-align: center;
            padding: 8px 4px;
        }

        .submit-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            height: 38px;
            padding: 0 24px;
            min-width: 120px;
            margin-left: auto;
        }
        .submit-btn:hover {
            background-color: #43a047;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-bottom: 10px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #f1f8e9;
            font-weight: 600;
            color: #33691e;
        }
        .expired {
            color: #d32f2f;
            font-weight: bold;
        }
        .not-set {
            color: #8e8e93;
            font-style: italic;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .delete-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-btn:hover {
            background-color: #c62828;
        }
        .claim-btn {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .claim-btn:hover {
            background-color: #0077ed;
        }
        .copy-btn {
            background-color: #8bc34a;
            color: white;
            border: none;
            padding: 4px 8px;
            margin-left: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            vertical-align: middle;
            transition: background-color 0.2s;
        }
        .copy-btn:hover {
            background-color: #7cb342;
        }
        .copy-btn.copied {
            background-color: #9e9e9e;
        }
        .empty-message {
            color: #8e8e93;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-box h4 {
            margin: 0;
            color: #2e7d32;
            font-size: 16px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }
        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .modal-btn.confirm { background-color: #4caf50; color: white; }
        .modal-btn.confirm:hover { background-color: #43a047; }
        .modal-btn.cancel { background-color: #e0e0e0; color: #333; }
        .modal-btn.cancel:hover { background-color: #d5d5d5; }
    </style>
</head>
<body>

<div class="container">
    <div class="view-counter" id="view-counter-text">瀏覽次數：0 次</div>

    <h2>皮克敏-巨菇-倒數追蹤器</h2>
    
    <div class="input-form">
        <div class="form-row-top">
            <div class="input-group">
                <label>使用者 (留空則進入待認領區)</label>
                <input type="text" id="user" placeholder="輸入使用者或留空">
            </div>
            
            <div class="input-group">
                <label>名稱</label>
                <input type="text" id="name" placeholder="例如：巨型火菇">
            </div>
            
            <div class="input-group">
                <label>座標</label>
                <input type="text" id="coords" placeholder="輸入座標">
            </div>
        </div>
        
        <div class="form-row-bottom">
            <div class="time-container">
                <div class="time-box">
                    <label>天</label>
                    <input type="number" id="days" min="0" value="0">
                </div>
                <div class="time-box">
                    <label>時</label>
                    <input type="number" id="hours" min="0" max="23" value="0">
                </div>
                <div class="time-box">
                    <label>分</label>
                    <input type="number" id="minutes" min="0" max="59" value="0">
                </div>
            </div>
            
            <button class="submit-btn" onclick="addItem()">新增資料</button>
        </div>
    </div>

    <h3>正常追蹤中</h3>
    <table>
        <thead>
            <tr>
                <th style="width: 60px;">編號</th>
                <th>使用者</th>
                <th>名稱</th>
                <th>座標</th>
                <th>剩餘時間</th>
                <th style="width: 120px;">操作</th>
            </tr>
        </thead>
        <tbody id="active-table-body"></tbody>
    </table>
    <div id="active-empty" class="empty-message" style="display: none;">目前沒有正在追蹤的項目</div>

    <h3>待認領巨菇</h3>
    <table>
        <thead>
            <tr>
                <th style="width: 60px;">編號</th>
                <th>使用者</th>
                <th>名稱</th>
                <th>座標</th>
                <th>剩餘時間</th>
                <th style="width: 120px;">操作</th>
            </tr>
        </thead>
        <tbody id="unclaimed-table-body"></tbody>
    </table>
    <div id="unclaimed-empty" class="empty-message" style="display: none;">目前沒有待認領的項目</div>
</div>

<div id="claim-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <h4 id="modal-title">認領巨菇</h4>
        <div class="input-group" style="min-width: 100%;">
            <label>認領人名字</label>
            <input type="text" id="modal-username" placeholder="請輸入名字">
        </div>
        <div class="input-group" style="min-width: 100%;">
            <label>設定剩餘時間 (若不確定可皆保持 0)</label>
            <div class="time-container" style="justify-content: center; margin-top: 5px;">
                <div class="time-box">
                    <label>天</label>
                    <input type="number" id="modal-days" min="0" value="0">
                </div>
                <div class="time-box">
                    <label>時</label>
                    <input type="number" id="modal-hours" min="0" max="23" value="0">
                </div>
                <div class="time-box">
                    <label>分</label>
                    <input type="number" id="modal-minutes" min="0" max="59" value="0">
                </div>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn confirm" id="modal-submit-btn">確定認領</button>
        </div>
    </div>
</div>

<script>
    let dataList = [];
    let currentSerialNumber = 1;
    let currentClaimingId = null;

    // 【新功能】網頁載入時自動計算並顯示瀏覽次數
    window.onload = function() {
        // 從瀏覽器快取中取出舊的次數，如果沒有就從 0 開始
        let currentViews = parseInt(localStorage.getItem('pikmin_tracker_views'), 10) || 0;
        currentViews++; // 這次進來算 1 次
        localStorage.setItem('pikmin_tracker_views', currentViews); // 存回快取
        
        // 更新到畫面上
        document.getElementById('view-counter-text').innerText = `瀏覽次數：${currentViews} 次`;
    };

    function addItem() {
        const userEl = document.getElementById('user');
        const nameEl = document.getElementById('name');
        const coordsEl = document.getElementById('coords');
        
        const dVal = document.getElementById('days').value;
        const hVal = document.getElementById('hours').value;
        const mVal = document.getElementById('minutes').value;

        const days = parseInt(dVal, 10) || 0;
        const hours = parseInt(hVal, 10) || 0;
        const minutes = parseInt(mVal, 10) || 0;

        if (!nameEl || !nameEl.value.trim() || !coordsEl || !coordsEl.value.trim()) {
            alert('請填寫名稱與座標欄位！');
            return;
        }

        let targetTime = null;
        if (days > 0 || hours > 0 || minutes > 0) {
            const totalMs = ((days * 24 * 60) + (hours * 60) + minutes) * 60 * 10
