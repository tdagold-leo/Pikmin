<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏-巨菇-倒數追蹤器</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f9f4;
            color: #333;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .view-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #c5e1a5;
        }

        h2, h3 {
            margin-top: 0;
            color: #2e7d32;
        }
        h2 {
            font-size: 20px;
            padding-right: 120px;
        }
        h3 {
            margin-top: 25px;
            border-bottom: 2px dashed #c5e1a5;
            padding-bottom: 6px;
            font-size: 16px;
            color: #558b2f;
        }
        
        .input-form {
            background: #f1f8e9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .form-row-top {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            width: 100%;
        }
        
        .form-row-bottom {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: flex-end;
            width: 100%;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 120px;
        }
        
        .input-group label {
            font-size: 11px;
            color: #558b2f;
            font-weight: bold;
        }
        
        .input-form input {
            padding: 6px 10px;
            border: 1px solid #c5e1a5;
            border-radius: 6px;
            font-size: 13px;
            box-sizing: border-box;
            height: 36px;
            width: 100%;
        }
        
        .time-container {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .time-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 50px;
        }
        .time-box label {
            font-size: 11px;
            color: #558b2f;
            font-weight: bold;
            text-align: center;
        }
        .time-box input {
            text-align: center;
            padding: 6px 2px;
            height: 36px;
        }

        .submit-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            height: 36px;
            padding: 0 16px;
            min-width: 100px;
            margin-left: auto;
        }
        .submit-btn:hover {
            background-color: #43a047;
        }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-bottom: 10px;
            font-size: 13px;
        }
        th, td {
            padding: 8px 6px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #f1f8e9;
            font-weight: 600;
            color: #33691e;
        }
        
        .col-coords {
            max-width: 110px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            vertical-align: middle;
        }

        .expired {
            color: #d32f2f;
            font-weight: bold;
        }
        .not-set {
            color: #8e8e93;
            font-style: italic;
        }

        /* 【新功能】時間到了之後整列反灰的樣式 */
        .row-expired {
            background-color: #f5f5f5; /* 背景變為淡灰 */
            color: #a1a1a1 !important; /* 文字變灰 */
        }
        .row-expired strong {
            color: #a1a1a1 !important;
        }
        .row-expired .col-coords {
            color: #a1a1a1 !important;
        }
        /* 時間到了之後，按鈕也跟著稍微變淡，維持畫面一致 */
        .row-expired .copy
