<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皮克敏-巨菇-雲端同步追蹤器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f9f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }
        
        .view-counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #c5e1a5;
        }

        h2, h3 {
            margin-top: 0;
            color: #2e7d32;
        }
        h3 {
            margin-top: 30px;
            border-bottom: 2px dashed #c5e1a5;
            padding-bottom: 8px;
            color: #558b2f;
        }
        
        .input-form {
            background: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .form-row-top {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
        }
        
        .form-row-bottom {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
            width: 100%;
        }
        
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 200px;
        }
        
        .input-group label {
            font-size: 12px;
            color: #558b2f;
            font-weight: bold;
        }
        
        .input-form input {
            padding: 8px 12px;
            border: 1px solid #c5e1a5;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            height: 38px;
            width: 100%;
        }
        
        .time-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .time-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 65px;
        }
        .time-box label {
            font-size: 12px;
            color: #558b2f;
            font-weight: bold;
            text-align: center;
        }
        .time-box input {
            text-align: center;
            padding: 8px 4px;
        }

        .submit-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            height: 38px;
            padding: 0 24px;
            min-width: 120px;
            margin-left: auto;
        }
        .submit-btn:hover {
            background-color: #43a047;
        }
        
        /* 針對小螢幕與手機優化輸入排版 */
        @media (max-width: 600px) {
            .view-counter {
                position: static;
                display: inline-block;
                margin-bottom: 15px;
            }
            .form-row-bottom {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .submit-btn {
                width: 100%;
                margin-left: 0;
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            margin-bottom: 10px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background-color: #f1f8e9;
            font-weight: 600;
            color: #33691e;
        }
        .expired {
            color: #d32f2f;
            font-weight: bold;
        }
        .not-set {
            color: #8e8e93;
            font-style: italic;
        }
        .action-btns {
            display: flex;
            gap: 5px;
        }
        .delete-btn {
            background-color: #e53935;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .delete-btn:hover {
            background-color: #c62828;
        }
        .claim-btn {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .claim-btn:hover {
            background-color: #0077ed;
        }
        .copy-btn {
            background-color: #8bc34a;
            color: white;
            border: none;
            padding: 4px 8px;
            margin-left: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            vertical-align: middle;
            transition: background-color 0.2s;
        }
        .copy-btn:hover {
            background-color: #7cb342;
        }
        .copy-btn.copied {
            background-color: #9e9e9e;
        }
        .empty-message {
            color: #8e8e93;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-box h4 {
            margin: 0;
            color: #2e7d32;
            font-size: 16px;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 5px;
        }
        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .modal-btn.confirm { background-color: #4caf50; color: white; }
        .modal-btn.confirm:hover { background-color: #43a047; }
        .modal-btn.cancel { background-color: #e0e0e0; color: #333; }
        .modal-btn.cancel:hover { background-color: #d5d5d5; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="container">
    <div class="view-counter" id="view-counter-text">雲端總瀏覽次數：0 次</div>

    <h2>皮克敏-巨菇-雲端同步追蹤器</h2>
    
    <div class="input-form">
        <div class="form-row-top">
            <div class="input-group">
                <label>使用者 (留空則進入待認領區)</label>
                <input type="text" id="user" placeholder="輸入使用者或留空">
            </div>
            
            <div class="input-group">
                <label>名稱</label>
                <input type="text" id="name" placeholder="例如：巨型火菇">
            </div>
            
            <div class="input-group">
                <label>座標</label>
                <input type="text" id="coords" placeholder="輸入座標">
            </div>
        </div>
        
        <div class="form-row-bottom">
            <div class="time-container">
                <div class="time-box">
                    <label>天</label>
                    <input type="number" id="days" min="0" value="0">
                </div>
                <div class="time-box">
                    <label>時</label>
                    <input type="number" id="hours" min="0" max="23" value="0">
                </div>
                <div class="time-box">
                    <label>分</label>
                    <input type="number" id="minutes" min="0" max="59" value="0">
                </div>
            </div>
            
            <button class="submit-btn" onclick="addItem()">新增資料</button>
        </div>
    </div>

    <h3>正常追蹤中</h3>
    <table>
        <thead>
            <tr>
                <th style="width: 60px;">編號</th>
                <th>使用者</th>
                <th>名稱</th>
                <th>座標</th>
                <th>剩餘時間</th>
                <th style="width: 120px;">操作</th>
            </tr>
        </thead>
        <tbody id="active-table-body"></tbody>
    </table>
    <div id="active-empty" class="empty-message" style="display: none;">目前沒有正在追蹤的項目</div>

    <h3>待認領巨菇</h3>
    <table>
        <thead>
            <tr>
                <th style="width: 60px;">編號</th>
                <th>使用者</th>
                <th>名稱</th>
                <th>座標</th>
                <th>剩餘時間</th>
                <th style="width: 120px;">操作</th>
            </tr>
        </thead>
        <tbody id="unclaimed-table-body"></tbody>
    </table>
    <div id="unclaimed-empty" class="empty-message" style="display: none;">目前沒有待認領的項目</div>
</div>

<div id="claim-modal" class="modal-overlay" style="display: none;">
    <div class="modal-box">
        <h4 id="modal-title">認領巨菇</h4>
        <div class="input-group" style="min-width: 100%;">
            <label>認領人名字</label>
            <input type="text" id="modal-username" placeholder="請輸入名字">
        </div>
        <div class="input-group" style="min-width: 100%;">
            <label>設定剩餘時間 (若不確定可皆保持 0)</label>
            <div class="time-container" style="justify-content: center; margin-top: 5px;">
                <div class="time-box">
                    <label>天</label>
                    <input type="number" id="modal-days" min="0" value="0">
                </div>
                <div class="time-box">
                    <label>時</label>
                    <input type="number" id="modal-hours" min="0" max="23" value="0">
                </div>
                <div class="time-box">
                    <label>分</label>
                    <input type="number" id="modal-minutes" min="0" max="59" value="0">
                </div>
            </div>
        </div>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">取消</button>
            <button class="modal-btn confirm" id="modal-submit-btn">確定認領</button>
        </div>
    </div>
</div>

<script>
    // 已將你圖片中的金鑰與資料庫網址完美填入
    const firebaseConfig = {
        apiKey: "AIzaSyBkmQhSKbiSTeHkbAnjSZTgYtGbmPySJbo",
        authDomain: "pikmin-tracker-3cf56.firebaseapp.com",
        databaseURL: "https://pikmin-tracker-3cf56-default-rtdb.firebaseio.com/",
        projectId: "pikmin-tracker-3cf56",
        storageBucket: "pikmin-tracker-3cf56.firebasestorage.app",
        messagingSenderId: "848190561510",
        appId: "1:848190561510:web:07ceb7fa8bc57a7004af27"
    };

    // 初始化 Firebase 服務
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let dataList = [];
    let currentClaimingId = null;

    // 即時監聽雲端資料庫變化
    database.ref('mushrooms').on('value', (snapshot) => {
        const cloudData = snapshot.val();
        dataList = [];
        if (cloudData) {
            Object.keys(cloudData).forEach((key) => {
                dataList.push({
                    id: key, 
                    sn: cloudData[key].sn,
                    user: cloudData[key].user,
                    name: cloudData[key].name,
                    coords: cloudData[key].coords,
                    targetTime: cloudData[key].targetTime
                });
            });
        }
        updateTable();
    });

    // 雲端全網總瀏覽次數統計機制
    database.ref('views').transaction((currentViews) => {
        return (currentViews || 0) + 1;
    });
    database.ref('views').on('value', (snapshot) => {
        const views = snapshot.val() || 0;
        document.getElementById('view-counter-text').innerText = `雲端總瀏覽次數：${views} 次`;
    });

    function addItem() {
        const userEl = document.getElementById('user');
        const nameEl = document.getElementById('name');
        const coordsEl = document.getElementById('coords');
        
        const dVal = document.getElementById('days').value;
        const hVal = document.getElementById('hours').value;
        const mVal = document.getElementById('minutes').value;

        const days = parseInt(dVal, 10) || 0;
        const hours = parseInt(hVal, 10) || 0;
        const minutes = parseInt(mVal, 10) || 0;

        if (!nameEl || !nameEl.value.trim() || !coordsEl || !coordsEl.value.trim()) {
            alert('請填寫名稱與座標欄位！');
            return;
        }

        let targetTime = null;
        if (days > 0 || hours > 0 || minutes > 0) {
            const totalMs = ((days * 24 * 60) + (hours * 60) + minutes) * 60 * 1000;
            targetTime = Date.now() + totalMs;
        }

        const processedUser = userEl ? userEl.value.trim() : "";

        let nextSn = 1;
        if (dataList.length > 0) {
            nextSn = Math.max(...dataList.map(item => item.sn || 0)) + 1;
        }

        const newItem = {
            sn: nextSn,
            user: processedUser,
            name: nameEl.value.trim(),
            coords: coordsEl.value.trim(),
            targetTime: targetTime
        };

        // 上傳至雲端資料庫
        database.ref('mushrooms').push(newItem);
        
        if(userEl) userEl.value = '';
        nameEl.value = '';
        coordsEl.value = '';
        document.getElementById('days').value = '0';
        document.getElementById('hours').value = '0';
        document.getElementById('minutes').value = '0';
    }

    function deleteItem(id) {
        if(confirm('確定要刪除這筆巨菇資料嗎？（刪除後所有人畫面都會同步消失）')) {
            database.ref('mushrooms/' + id).remove();
        }
    }

    function openClaimModal(id, currentName) {
        currentClaimingId = id;
        document.getElementById('modal-title').innerText = `認領巨菇 - ${currentName}`;
        document.getElementById('modal-username').value = '';
        document.getElementById('modal-days').value = '0';
        document.getElementById('modal-hours').value = '0';
        document.getElementById('modal-minutes').value = '0';
        
        document.getElementById('modal-submit-btn').onclick = submitClaim;
        document.getElementById('claim-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('claim-modal').style.display = 'none';
        currentClaimingId = null;
    }

    function submitClaim() {
        const usernameInput = document.getElementById('modal-username').value.trim();
        if (!usernameInput) {
            alert('請輸入認領人的名字！');
            return;
        }

        const d = parseInt(document.getElementById('modal-days').value, 10) || 0;
        const h = parseInt(document.getElementById('modal-hours').value, 10) || 0;
        const m = parseInt(document.getElementById('modal-minutes').value, 10) || 0;

        const updates = {
            user: usernameInput
        };
        
        if (d > 0 || h > 0 || m > 0) {
            const totalMs = ((d * 24 * 60) + (h * 60) + m) * 60 * 1000;
            updates.targetTime = Date.now() + totalMs;
        }
        
        database.ref('mushrooms/' + currentClaimingId).update(updates);
        closeModal();
    }

    function copyCoords(text, buttonElement) {
        navigator.clipboard.writeText(text).then(() => {
            const originalText = buttonElement.innerText;
            buttonElement.innerText = '已複製！';
            buttonElement.classList.add('copied');
            buttonElement.disabled = true;

            setTimeout(() => {
                buttonElement.innerText = originalText;
                buttonElement.classList.remove('copied');
                buttonElement.disabled = false;
            }, 1500);
        }).catch(err => {
            console.error('無法複製座標: ', err);
            alert('複製失敗，請手動複製。');
        });
    }

    function updateTable() {
        const activeTbody = document.getElementById('active-table-body');
        const unclaimedTbody = document.getElementById('unclaimed-table-body');
        if (!activeTbody || !unclaimedTbody) return;

        const now = Date.now();

        const sortedList = [...dataList].sort((a, b) => {
            if (a.targetTime === null && b.targetTime === null) return 0;
            if (a.targetTime === null) return 1;
            if (b.targetTime === null) return -1;
            return a.targetTime - b.targetTime;
        });

        activeTbody.innerHTML = '';
        unclaimedTbody.innerHTML = '';

        let activeCount = 0;
        let unclaimedCount = 0;

        sortedList.forEach((item) => {
            const tr = document.createElement('tr');
            let timeText = '';

            if (item.targetTime === null) {
                timeText = '<span class="not-set">尚未設定</span>';
            } else {
                const remainingMs = item.targetTime - now;
                if (remainingMs <= 0) {
                    timeText = '<span class="expired">已過期/可開打！</span>';
                } else {
                    const totalSeconds = Math.floor(remainingMs / 1000);
                    const totalMinutes = Math.floor(totalSeconds / 60);
                    const totalHours = Math.floor(totalMinutes / 60);
                    
                    const days = Math.floor(totalHours / 24);
                    const hours = totalHours % 24;
                    const mins = totalMinutes % 60;
                    const secs = totalSeconds % 60;

                    if (days > 0) {
                        timeText = `${days} 天 ${hours} 時 ${mins} 分`;
                    } else if (hours > 0) {
                        timeText = `${hours} 時 ${mins} 分 ${secs} 秒`;
                    } else {
                        timeText = `${mins} 分 ${secs} 秒`;
                    }
                }
            }

            const safeCoords = escapeHtml(item.coords);
            const safeName = escapeHtml(item.name);

            if (item.user === "") {
                unclaimedCount++;
                tr.innerHTML = `
                    <td>${item.sn}</td>
                    <td><span style="color:#8e8e93; font-style:italic;">無</span></td>
                    <td>${safeName}</td>
                    <td>
                        <span>${safeCoords}</span>
                        <button class="copy-btn" onclick="copyCoords('${safeCoords.replace(/'/g, "\\'")}', this)">複製</button>
                    </td>
                    <td>${timeText}</td>
                    <td>
                        <div class="action-btns">
                            <button class="claim-btn" onclick="openClaimModal('${item.id}', '${safeName.replace(/'/g, "\\'")}')">認領</button>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">刪除</button>
                        </div>
                    </td>
                `;
                unclaimedTbody.appendChild(tr);
            } else {
                activeCount++;
                tr.innerHTML = `
                    <td>${item.sn}</td>
                    <td><strong>${escapeHtml(item.user)}</strong></td>
                    <td>${safeName}</td>
                    <td>
                        <span>${safeCoords}</span>
                        <button class="copy-btn" onclick="copyCoords('${safeCoords.replace(/'/g, "\\'")}', this)">複製</button>
                    </td>
                    <td>${timeText}</td>
                    <td>
                        <div class="action-btns">
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">刪除</button>
                        </div>
                    </td>
                `;
                activeTbody.appendChild(tr);
            }
        });

        document.getElementById('active-empty').style.display = activeCount === 0 ? 'block' : 'none';
        document.getElementById('unclaimed-empty').style.display = unclaimedCount === 0 ? 'block' : 'none';
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    setInterval(updateTable, 1000);
</script>

</body>
</html>
